<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8f9fa">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#34495e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Puter AI Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div id="app-container">
        <!-- App Header -->
        <header id="app-header">
            <button id="new-chat-btn" title="New Chat">➕</button>
            <div id="header-title">Puter AI Chat</div>
            <div id="header-options">
                <select id="model-select"></select>
                <button id="settings-btn" title="Settings">⚙️</button>
            </div>
            <button id="mobile-menu-btn" class="hidden">☰</button>
        </header>

        <!-- Chat Display Area -->
        <main id="chat-display">
            <!-- Messages will be dynamically inserted here -->
            <button id="ocr-upload-btn" class="hidden">Upload Image for OCR</button>
        </main>

        <!-- Apps Bar -->
        <div id="apps-bar">
            <button class="app-btn" data-mode="history" title="History">📖</button>
            <button class="app-btn" data-mode="image" title="Image Generation">🖼️</button>
            <button class="app-btn" data-mode="ocr" title="OCR">📄</button>
            <button class="app-btn" data-mode="tts" title="Text to Speech">🔊</button>
            <button class="app-btn" data-mode="code" title="Code Mode">💻</button>
            <button class="app-btn" data-mode="prompts" title="Prompts">💡</button>
        </div>

        <!-- Text Input Area -->
        <div id="input-area">
            <button id="apps-bar-toggle-btn" class="hidden">📱</button>
            <textarea id="user-input" placeholder="Type your message here..."></textarea>
            <button id="send-btn">➤</button>
        </div>

        <!-- App Footer -->
        <footer id="app-footer">
            <p>
                Created By <a href="https://jayreddin.github.io" target="_blank">Jamie Reddin</a>
                using <a href="https://puter.com" target="_blank">Puter.com</a> | <a href="https://developer.puter.com" target="_blank">Powered by Puter</a> | Version: 1.0
            </p>
        </footer>
    </div>

    <!-- Settings Modal (Hidden by default) -->
    <div id="settings-modal" class="hidden">
        <div id="settings-content">
            <div id="settings-tabs">
                <button class="tab-link active" data-tab="ui-settings">UI</button>
                <button class="tab-link" data-tab="ai-settings">AI</button>
            </div>

            <!-- UI Settings Tab -->
            <div id="ui-settings" class="tab-content active">
                <h3>UI Settings</h3>
                <div class="setting-item">
                    <label for="theme-select">Theme:</label>
                    <select id="theme-select">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="text-size-slider">Text Size:</label>
                    <input type="range" id="text-size-slider" min="1" max="100" value="50">
                    <span id="text-size-value">50%</span>
                </div>
            </div>

            <!-- AI Settings Tab -->
            <div id="ai-settings" class="tab-content">
                <h3>AI Model Settings</h3>
                <div id="model-list-container">
                    <!-- AI models will be dynamically inserted here -->
                </div>
            </div>

            <!-- Modal Footer -->
            <div id="settings-footer">
                <button id="save-settings-btn">Save & Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- History Modal -->
    <div id="history-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Chat History</h2>
            <div id="history-list"></div>
            <button class="close-modal-btn">Close</button>
        </div>
    </div>

    <!-- Prompts Modal -->
    <div id="prompts-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Prompts</h2>
            <div class="prompt-enhancer-section">
                <h4>Prompt Enhancer</h4>
                <textarea id="prompt-enhancer-input" placeholder="Enter a basic prompt to enhance..."></textarea>
                <button id="enhance-prompt-btn">Enhance</button>
            </div>
            <div class="prompt-list-section">
                <h4>Your Prompts</h4>
                <div id="prompt-list"></div>
                <div id="add-prompt-form">
                    <input type="text" id="new-prompt-input" placeholder="Add a new custom prompt">
                    <button id="add-prompt-btn">Add</button>
                </div>
            </div>
            <button class="close-modal-btn">Close</button>
        </div>
    </div>

    <!-- TTS Modal -->
    <div id="tts-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Text to Speech</h2>
            <textarea id="tts-input" placeholder="Enter text to speak..."></textarea>
            <button id="tts-play-btn">Play</button>
            <button class="close-modal-btn">Close</button>
        </div>
    </div>
</body>
</html>
